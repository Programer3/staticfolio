name: LOC Counter

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  count-lines:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count lines of code
        id: loc
        run: |
          TOTAL=$(git ls-files | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          TODAY_LINES=$(git log --after="$YESTERDAY" --oneline --numstat 2>/dev/null | awk '/^[0-9]/ {a+=$1} END {print a}')
          echo "today=${TODAY_LINES:-0}" >> $GITHUB_OUTPUT

          for i in $(seq 0 29); do
            DAY=$(date -d "$i days ago" +%Y-%m-%d)
            COUNT=$(git log --after="$DAY 00:00" --before="$DAY 23:59" --oneline 2>/dev/null | wc -l)
            echo "$COUNT"
          done > /tmp/history.txt

      - name: Generate loc-data.json
        run: |
          cat > public/loc-data.json << EOF
          {
            "totalLines": ${{ steps.loc.outputs.total }},
            "todayLines": ${{ steps.loc.outputs.today }},
            "history": [$(paste -sd, /tmp/history.txt)],
            "updatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/loc-data.json
          git diff --staged --quiet || git commit -m "chore: update LOC data [skip ci]"
          git push
