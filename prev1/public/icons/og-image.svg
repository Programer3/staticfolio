  <text x="80" y="480" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="26" fill="#adaabf">Curious and organized. Algorithms, logic, and maintainability first.</text>

  <g font-family="'IBM Plex Mono', monospace" font-size="20" fill="#adaabf">
