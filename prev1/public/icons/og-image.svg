  <circle cx="980" cy="120" r="320" fill="url(#orb)" />

  <text x="80" y="150" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="22" letter-spacing="6" fill="#20a39e">~/chaman/portfolio</text>

