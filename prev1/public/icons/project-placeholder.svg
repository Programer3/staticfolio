<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Project preview placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#313e50" />
      <stop offset="100%" stop-color="#283242" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffba49" stroke-width="0.5" opacity="0.12" />
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" />
  <rect width="640" height="360" fill="url(#grid)" />
  <!-- window chrome -->
  <circle cx="40" cy="40" r="6" fill="#ef5b5b" opacity="0.8" />
  <circle cx="62" cy="40" r="6" fill="#ffba49" opacity="0.8" />
  <circle cx="84" cy="40" r="6" fill="#20a39e" opacity="0.8" />
  <!-- code brackets -->
  <text x="320" y="200" font-family="'JetBrains Mono','IBM Plex Mono',monospace" font-size="120" font-weight="700" fill="#ffba49" text-anchor="middle" opacity="0.85">&lt;/&gt;</text>
  <text x="320" y="260" font-family="'IBM Plex Mono',monospace" font-size="16" letter-spacing="4" fill="#adaabf" text-anchor="middle">PROJECT PREVIEW</text>
</svg>
